version: '3.8'

services:
  # 1. Swing Trader (live account)
  swing_bot:
    build: .
    container_name: alpaca_swing_bot
    command: python -m src.bots.multimodal_trader --mode swing --watchlist config/watchlists/swing_liquid.txt
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./src:/app/src
      - ./config:/app/config
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - BOT_NAME=swing_bot
    restart: unless-stopped

  # 2. Options (swing signals → call debit spreads, paper only)
  options_bot:
    build: .
    container_name: alpaca_options_bot
    command: python -m src.bots.multimodal_trader --mode options --watchlist config/watchlists/swing_liquid.txt
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./src:/app/src
      - ./config:/app/config
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - BOT_NAME=options_bot
      - ALPACA_BASE_URL=https://paper-api.alpaca.markets
    restart: unless-stopped

  # 3. Paper swing (same bot as swing_bot — SwingTraderConfig + Gen7 — paper keys/host only)
  paper_swing_bot:
    build: .
    container_name: alpaca_paper_swing_bot
    command: python -m src.bots.multimodal_trader --mode paper_swing --watchlist config/watchlists/swing_liquid.txt
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./src:/app/src
      - ./config:/app/config
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - BOT_NAME=paper_swing_bot
      - PAPER_SWING_ALPACA_BASE_URL=https://paper-api.alpaca.markets
    restart: unless-stopped
